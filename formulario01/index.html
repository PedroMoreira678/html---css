<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Formulario</title>
</head>
<body>
    <h1>Cadastro</h1>
    <form action="cadastro.js" method="post" autocomplete="on">
        <p><label for="inome">Nome Completo:</label> 
            <input type="text" name="nome" id="inome" maxlength="50" autocomplete="name" placeholder="Preencha seu nome" required>
        </p>
        <p><label for="iemal">E-mail:</label> 
            <input type="email" name="email" id="iemal" maxlength="100" autocomplete="email" placeholder="Preencha seu e-mail" required>
        </p>
        <p><label for="isenha">Senha:</label> 
            <input type="password" name="Senha" id="isenha" minlength="8" maxlength="30" autocomplete="new-password" placeholder="Digite sua senha" required>
        </p>
        <p>
            <label for="imes">Mês:</label>
            <input type="date" name="mes" id="imes" value="2026-05-03" required>
        </p>

        <p>
            <label for="in1">Valor:</label>
            <input type="number" name="n1" id="in1" min="0" max="100" oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
            +
            <label for="in2"></label>
            <input type="number" name="n2" id="in2" min="0" max="100" oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)">
        </p>

        <p>
                <label for="isoma">Total:</label>
                <output name="soma" id="isoma">0</output>
        </p>

        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
    
</body>
</html>
