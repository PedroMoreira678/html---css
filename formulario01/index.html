<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Formulario</title>
    <style>
        input {
            border-radius: 8px 8px;
        }
    </style>
</head>
<body>
    <h1>Cadastro</h1>
    <form action="cadastro.php" method="post" autocomplete="on">
        <p><label for="inome">Nome Completo:</label> 
            <input type="text" name="nome" id="inome" maxlength="50" autocomplete="additional-name" placeholder="Preencha seu Nome" required>
        </p>
        <p><label for="iemal">E-mail:</label> 
            <input type="email" name="email" id="iemal" maxlength="30" autocomplete="email" placeholder="Preencha seu E-mail" required>
        </p>
        <p><label for="isenha">Senha:</label> 
            <input type="password" name="Senha" id="isenha" minlength="8" maxlength="30" autocomplete="new-password" placeholder="Digite sua senha" required>
        </p>
        <input type="submit" value="Cadastrar">
        <input type="reset" value="Limpar">
    </form>
    
</body>
</html>
