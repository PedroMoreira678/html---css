<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonts com Google Fontes</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chiron+Hei+HK:ital,wght@0,200..900;1,200..900&family=Molle:ital@1&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap');

        @import url('https://fonts.googleapis.com/css2?family=Chiron+Hei+HK:ital,wght@0,200..900;1,200..900&family=Zain:ital,wght@0,200;0,300;0,400;0,700;0,800;0,900;1,300;1,400&display=swap');

        h1 {
font-family: "Molle", cursive;
  font-weight: 400;
  font-style: italic;
        }

        p {
            font-family: "Zain", sans-serif;
  font-weight: 200;
  font-style: normal;
        }
    </style>
</head>
<body>
    <h1>Seja Bem Vindo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium, qui excepturi corrupti voluptatum ullam voluptatibus quis laboriosam, vel dignissimos dolor est aliquid suscipit quibusdam perferendis velit nemo reprehenderit tempore ipsam?</p>
    
</body>
</html>
