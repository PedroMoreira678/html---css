<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>divs</title>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }
    div:hover {
        color: red;
    }
    div > p {
        display: none;
    }
    div:hover > p {
        display: block;
        color: white;
        background-color: cornflowerblue;
        width: 300px;
    }
</style>
</head>
<body>
    <h1>Ola</h1>
    <p>Passe o Mouse no texto abaixo</p>
    <div>Aqui
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Reprehenderit nesciunt, sequi iste temporibus, facilis eveniet exercitationem similique, molestias dolorum nostrum debitis incidunt quod doloribus? Nostrum tenetur repudiandae quas quae quibusdam?</p>
    </div>
    
</body>
</html>
